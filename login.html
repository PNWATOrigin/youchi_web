<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>YOUCHI · 로그인</title>
    <link rel="icon" href="data:," />
    <link rel="stylesheet" href="./styles.css?v=v4-manual-line-breaks" />
  </head>
  <body data-page="login">
    <div class="app-shell auth-shell" data-role="advertiser">
      <header class="topbar">
        <a class="brand auth-brand" href="./index.html">YOUCHI</a>
        <div class="top-actions">
          <div class="dropdown">
            <button class="role-chip dropdown-toggle" type="button" aria-expanded="false">서비스</button>
            <div class="dropdown-menu">
              <a href="./index.html">메인</a>
              <a href="./creator.html">크리에이터</a>
              <a href="./investment.html">투자자</a>
            </div>
          </div>
          <a class="login-link" href="./index.html">메인</a>
        </div>
      </header>

      <main class="auth-main">
        <section class="auth-panel">
          <div>
            <p class="eyebrow">Welcome Back</p>
            <h1>YOUCHI 로그인</h1>
            <p>
              데모 페이지에서는 서버 인증 없이 입력값을 확인한 뒤 localStorage에 로그인 상태를 저장합니다.
              GitHub Pages에서도 이런 화면 전환과 메뉴 동작은 정상적으로 사용할 수 있습니다.
            </p>
          </div>

          <form class="login-form" id="loginForm">
            <label>
              이메일
              <input type="email" name="email" value="youchi.user@youchi.io" required />
            </label>
            <label>
              비밀번호
              <input type="password" name="password" value="demo1234" minlength="4" required />
            </label>
            <label>
              로그인 역할
              <select name="role">
                <option value="advertiser">광고주</option>
                <option value="creator">크리에이터</option>
                <option value="investor">투자자</option>
              </select>
            </label>
            <button class="primary-button" type="submit">로그인하고 대시보드 보기</button>
            <p class="form-note">예시 계정: youchi.user@youchi.io / demo1234</p>
          </form>
        </section>

        <section class="auth-side">
          <div class="score-card">
            <span>Connected Ecosystem</span>
            <strong>4-Way</strong>
            <p>분석 · 광고 · 거래 · 투자를 하나의 계정에서 관리합니다.</p>
          </div>
          <div class="mini-list"><span>통합 계정 관리</span><b>권한 전환</b></div>
          <div class="mini-list"><span>알림 센터</span><b>실시간</b></div>
          <div class="mini-list"><span>고객 지원</span><b>CS</b></div>
        </section>
      </main>
    </div>

    <script src="./script.js?v=v4-manual-line-breaks"></script>
  </body>
</html>
