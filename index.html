<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>YOUCHI App Web Preview</title>
    <meta
      name="description"
      content="YOUCHI 앱 화면을 웹에서 확인할 수 있는 정적 GitHub Pages 데모입니다."
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body data-page="home">
    <div class="app-shell app-preview-shell" data-role="advertiser">
      <aside class="drawer" id="drawer" aria-hidden="true">
        <div class="drawer__panel">
          <div class="drawer__header">
            <div class="avatar">김</div>
            <div>
              <strong>김유치님</strong>
              <span>Premium Member</span>
            </div>
            <button class="icon-button" id="drawerCloseButton" aria-label="메뉴 닫기">×</button>
          </div>
          <nav class="drawer-links" id="drawerLinks"></nav>
          <button class="drawer-mypage" id="myPageButton" type="button">마이페이지 · 지갑/계정/알림</button>
          <button class="drawer-mypage" type="button" onclick="location.href='./login.html'">로그인 페이지 보기</button>
          <p class="drawer-version">YOUCHI v3 · App Web Preview</p>
        </div>
      </aside>

      <main class="web-app-layout">
        <div class="device-frame web-app-frame">
          <header class="appbar">
            <button class="icon-button" id="menuButton" aria-label="메뉴 열기">☰</button>
            <strong class="app-title">YOUCHI</strong>
            <button class="role-chip" id="roleCycleButton" type="button">광고주</button>
          </header>

          <section class="app-content" id="appContent" aria-live="polite"></section>

          <nav class="app-bottom-nav" id="bottomNav" aria-label="앱 하단 메뉴"></nav>
        </div>
      </main>

      <div class="modal" id="myPageModal" aria-hidden="true" role="dialog" aria-labelledby="myPageTitle">
        <div class="modal__backdrop"></div>
        <div class="modal__panel">
          <div class="modal__handle"></div>
          <div class="modal__head">
            <h2 id="myPageTitle">마이페이지</h2>
            <button class="icon-button" id="modalCloseButton" aria-label="마이페이지 닫기">×</button>
          </div>
          <div class="profile-card">
            <div class="avatar">김</div>
            <div>
              <strong>김유치님</strong>
              <span>youchi.user@youchi.io</span>
            </div>
            <b>PREMIUM</b>
          </div>
          <div class="wallet-card">
            <h3>통합 자산 지갑</h3>
            <p><span>보유 원화</span><strong>₩ 15,420,000</strong></p>
            <p><span>보유 토큰</span><strong>25,000 YOUCHI</strong></p>
            <p><span>스테이블 코인</span><strong>1,200.50 USDT</strong></p>
          </div>
          <div class="wallet-card">
            <h3>실시간 알림 리스트</h3>
            <p><span>새 광고 캠페인 제안</span><strong>10분 전</strong></p>
            <p><span>분배금 정산 완료</span><strong>2시간 전</strong></p>
          </div>
        </div>
      </div>
    </div>

    <script src="./script.js"></script>
  </body>
</html>
